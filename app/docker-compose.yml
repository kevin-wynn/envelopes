version: '3.8'

services:
  envelopes:
    build: .
    container_name: envelopes
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      - DATABASE_URL=/app/data/envelopes.db
      - JWT_SECRET=${JWT_SECRET:-please-change-this-to-a-random-secret}
      - ENVELOPES_USERNAME=${ENVELOPES_USERNAME:-admin}
      - ENVELOPES_PASSWORD=${ENVELOPES_PASSWORD:-changeme}
    volumes:
      - envelopes_data:/app/data

volumes:
  envelopes_data:
    driver: local
